name: Scrape MSC Vigo

on:
  schedule:
    # Ejecutar cada 6 horas: 0:00, 6:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Permite lanzarlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: |
          pip install selenium

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Instalar ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Ejecutar scraper MSC
        run: python mscok.py

      - name: Mostrar debug
        run: cat debug_msc.txt || echo "Sin debug"

      - name: Guardar barcos_msc.json en el repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add barcos_msc.json
          git diff --staged --quiet || git commit -m "🚢 Actualización MSC $(date +'%d/%m/%Y %H:%M')"
          git push
